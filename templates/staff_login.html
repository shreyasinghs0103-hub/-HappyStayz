{% extends "base.html" %}
{% block title %}Staff Login — HappyStayz{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="mb-4"><i class="bi bi-person-badge"></i> Staff Login</h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <p class="text-muted small mt-3">Demo accounts: username <code>aarav1</code> style (see admin/staff panel), password <code>staff123</code> for all seeded staff.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
