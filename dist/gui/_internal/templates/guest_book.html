{% extends "base.html" %}
{% block title %}Book a Room — HappyStayz{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="mb-4"><i class="bi bi-calendar-check"></i> Book Your Stay</h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="guest_name" required>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" name="guest_email">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control" name="guest_phone">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Room Type</label>
            <select class="form-select" name="room_type" required>
              {% for rt in room_types %}
              <option value="{{ rt.room_type }}">{{ rt.room_type }} — ₹{{ '%.0f'|format(rt.price_per_night) }}/night</option>
              {% endfor %}
            </select>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Check-In Date</label>
              <input type="date" class="form-control" name="check_in_date" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Check-Out Date</label>
              <input type="date" class="form-control" name="check_out_date" required>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Adults</label>
              <input type="number" class="form-control" name="adults" min="1" value="1">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Children</label>
              <input type="number" class="form-control" name="children" min="0" value="0">
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">Confirm Booking</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
